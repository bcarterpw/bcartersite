<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benjamin Carter, Ph.D.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f2f0e2; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #37474f; padding: 28px 20px 60px; }
    .card { background: #fff; border-radius: 8px; width: 100%; max-width: 800px; margin: 0 auto; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .nav-inner {   justify-content: center; display: flex; padding: 0 16px; border-bottom: 1px solid #f0f0f0; }
    .nav-inner a { display: block; font-size: 16px; font-weight: 300; color: #546e7a; text-decoration: none; padding: 13px 25px; letter-spacing: 0.02em; transition: color 0.15s; }
    .nav-inner a:hover { color: #1565c0;}
    .nav-inner a.active { color: black; font-weight: 600; }
    .accent-bar { height: 25px; background: linear-gradient(90deg, #1565c0, #74de9a); position: relative; }
    .accent-bar::after {  content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255, 255, 255, 1) 0.01px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 1) 0.01px, transparent 1px);  background-size: 8px 8px;}
    .card-body { }
    .about-layout { display: block; gap: 32px; align-items: flex-start; }
    .about-photo { width: 120px;  border-radius: 5px; flex-shrink: 0;margin-top:15px; object-fit: cover; background: #cfd8dc; }
    .about-info { flex: 1; }
    .about-name { font-size: 22px; font-weight: 600; color: black; font-family: Georgia, 'Times New Roman', serif; margin-bottom: 8px; }
    .about-role { font-weight: 300;font-size: 16px; color: #607d8b; margin-bottom: 14px; line-height: 1.4; white-space: nowrap; }
    .about-tagline { font-weight: 300;font-size: 16px; color: #37474f; line-height: 1.65; margin-bottom: 12px; }
    .about-bio { font-weight: 300;font-size: 16px; color: #37474f; line-height: 1.7; margin-bottom: 12px; }
    .about-bio:last-child { margin-bottom: 0; }
    .about-bio a { color: #1565c0; text-decoration: none; }
    .about-bio a:hover { text-decoration: underline; }
    .contact-bar { border-top: 1px solid #eceff1; padding: 14px 40px; font-size: 13px; color: #90a4ae; text-align: center; }
    .contact-bar strong { color: #607d8b; }
    .contact-bar a { color: #1565c0; text-decoration: none; }
    .contact-bar a:hover { text-decoration: underline; }
    .cubes{filter: brightness(1); width: 70px;margin-top:-30px; z-index:-1; -moz-transition: all 1s ease; -webkit-transition: all 1s ease; -o-transition: all 1s ease; transition: all 1s ease;  -webkit-user-drag: none;}

    .cubes:hover{filter: brightness(1); -moz-transform: rotate(-180deg)  ; /* WebKit */  -webkit-transform:  rotate(-180deg) ; /* Opera */ -o-transform: rotate(-180deg) ;  /* Standard */  transform: rotate(-180deg);}

    .gameImg{
    filter: brightness(.95);
     /* Firefox */
    -moz-transition: all .1s ease;
    /* WebKit */
    -webkit-transition: all .1s ease;
    /* Opera */
    -o-transition: all .1s ease;
    /* Standard */
    transition: all .1s ease;
    -webkit-user-drag: none;
    }
    .gameImg:hover{
      cursor:pointer;
      filter: brightness(1.03);
      -moz-transform: scale(1.03) ;

      /* WebKit */
      -webkit-transform: scale(1.03);
      /* Opera */
      -o-transform: scale(1.03);
      /* Standard */
      transform: scale(1.03);
        }
    @media (max-width: 600px) {
      body { padding: 16px 12px 40px; }
      .card-body { padding: 24px 20px 20px; }
      .about-layout { flex-direction: column; }
 .about-layout { flex-direction: column; align-items: center; }
      .about-photo {   min-width: 90px;  height:inherit; }
      .about-role { white-space: normal; }
      .contact-bar { padding: 14px 20px; }
      .nav-inner {   justify-content: center; display: block; padding: 0 16px; border-bottom: 1px solid #f0f0f0; }
      .nav-inner a { display:flex;justify-content: center; font-size: 16px; font-weight: 300; color: #546e7a; text-decoration: none; padding: 13px 50%; letter-spacing: 0.02em; transition: color 0.15s; }
    }
  </style>
</head>
